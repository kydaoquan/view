<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĐQ Live Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            background: #000; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #iframe-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .footer-banner {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background-image: url('https://raw.githubusercontent.com/kydaoquan/view/main/footer1.PNG');
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center bottom;
            z-index: 5;
            pointer-events: none;
        }

        .player {
            min-width: 140px;
            padding: 12px 50px;
            border-radius: 25px;
            font-size: 27px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .red { background: linear-gradient(135deg, rgba(255, 60, 60, 0.8), rgba(150, 0, 0, 0.8)); }
        .blue { background: linear-gradient(135deg, rgba(0, 45, 140, 0.8), rgba(0, 10, 70, 0.8)); }

        /* CSS cho các ô nhập liệu */
        input, textarea { 
            background: #222; 
            color: white; 
            padding: 12px; 
            border: 1px solid #444; 
            border-radius: 6px; 
            outline: none; 
            width: 100%; 
            font-family: 'Montserrat', sans-serif; 
            font-size: 14px;
        }

        .overlay {
            position: fixed;
            top: 70px; 
            width: 100%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            padding: 0 80px;
            pointer-events: none;
        }

        #tournament-display {
            position: fixed;
            bottom: 45px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: #FFD700; 
            font-size: 15px;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.5), 0 0 20px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.6);
            padding: 8px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            pointer-events: none;
            max-width: 80%;
            text-align: center;
            word-wrap: break-word;
            font-family: 'Montserrat', sans-serif;
        }

        #extra-info-display {
            position: fixed;
            top: 1px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: #FFD700; 
            font-size: 25px;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(255, 215, 0, 0.5), 0 0 20px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            pointer-events: none;
            white-space: nowrap; 
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90%;
            font-family: 'Montserrat', sans-serif;
        }

        .panel {
            position: fixed;
            bottom: 150px; left: 10px; right: 10px;
            background: rgba(20, 20, 20, 0.95);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 20;
            border: 1px solid #555;
        }

        .btn-action { padding: 12px; border: none; border-radius: 6px; background: #00c853; color: white; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="iframe-wrapper">
        <iframe id="stream-iframe" src="" allow="camera *; microphone *; autoplay *; fullscreen *" allowfullscreen></iframe>
    </div>

    <div class="footer-banner"></div>

    <div class="overlay">
        <div class="player red" id="name1">Tiên</div>
        <div class="player blue" id="name2">Hậu</div>
    </div>

    <div id="tournament-display"></div>
    <div id="extra-info-display"></div>

    <div class="panel" id="panel">
        <input id="inputTournament" placeholder="Cập nhật vòng đấu">
        <textarea id="inputExtra" placeholder="Thông tin giải đấu..." style="height:50px;"></textarea>
        <label style="color:white; display:flex; align-items:center; gap:8px;">
            <input type="checkbox" id="checkExtra" style="width:auto;"> Hiện thông tin giải đấu
        </label>
        <div style="display: flex; gap: 8px;">
            <input id="input1" placeholder="Tên Đỏ">
            <input id="input2" placeholder="Tên Xanh">
        </div>
        <button class="btn-action" onclick="updateInfo()">Cập nhật thông tin</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // MÀY THAY ĐOẠN NÀY THÀNH CONFIG CỦA MÀY NHA
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "kydaoquan.firebaseapp.com",
            databaseURL: "https://kydaoquan-default-rtdb.firebaseio.com", 
            projectId: "kydaoquan",
            storageBucket: "kydaoquan.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, "overlay_data");

      const params = new URLSearchParams(window.location.search);
if (params.get("panel") !== "1") {
    document.getElementById("panel").style.display = "none";
}

        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        }
        setInterval(() => { console.clear(); }, 1000);

        const secretDomain = atob("aHR0cHM6Ly92ZG8ubmluamEv");
        document.getElementById("stream-iframe").src = `${secretDomain}?view=quocdang&cleanoutput&noaudio&buffer=0`;

        // Đồng bộ dữ liệu Real-time tự động giữa các máy
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById("name1").innerText = data.d || "Tiên";
                document.getElementById("name2").innerText = data.x || "Hậu";
                document.getElementById("tournament-display").innerText = data.t || "";
                
                const extraDiv = document.getElementById("extra-info-display");
                extraDiv.innerText = data.e || "";
                extraDiv.style.display = (data.c === 1 && data.e) ? "block" : "none";

                document.getElementById("input1").value = data.d || "Tiên";
                document.getElementById("input2").value = data.x || "Hậu";
                document.getElementById("inputTournament").value = data.t || "";
                document.getElementById("inputExtra").value = data.e || "";
                document.getElementById("checkExtra").checked = (data.c === 1);
            }
        });

        // Hàm cập nhật khi bấm nút dữ liệu sẽ bắn thẳng lên mây
        window.updateInfo = function() {
            const tournament = document.getElementById("inputTournament").value.trim();
            const extra = document.getElementById("inputExtra").value.trim();
            const isChecked = document.getElementById("checkExtra").checked;
            const n1 = document.getElementById("input1").value.trim() || "Tiên";
            const n2 = document.getElementById("input2").value.trim() || "Hậu";
            
            set(dbRef, {
                t: tournament,
                e: extra,
                d: n1,
                x: n2,
                c: isChecked ? 1 : 0
            });
        }
    </script>
</body>
</html>
