<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KĐQ Live Stream - Pro Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* Reset cơ bản để tránh tràn màn hình */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            /* Chặn bôi đen text trên giao diện */
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            margin: 0;
            background: #000;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            width: 100%;
            height: 100vh;
        }

        /* KHUNG BỌC IFRAME */
        #iframe-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            background: #000;
        }

        /* VIDEO - Full màn hình */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* OVERLAY - Chứa tên Player */
        .overlay {
            position: fixed;
            top: 80px;
            left: 0;
            width: 100%;
            z-index: 10;
            pointer-events: none; /* Click xuyên qua để không vướng video */
            display: flex;
            justify-content: space-between;
            padding: 0 150px;
        }

        .player {
            min-width: 180px;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 28px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .red {
            background: linear-gradient(135deg, rgba(255, 42, 42, 0.9), rgba(122, 0, 0, 0.9));
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4), 0 8px 25px rgba(0,0,0,0.6);
        }

        .blue {
            background: linear-gradient(135deg, rgba(42, 123, 255, 0.9), rgba(0, 31, 122, 0.9));
            box-shadow: 0 0 20px rgba(0, 120, 255, 0.4), 0 8px 25px rgba(0,0,0,0.6);
        }

        /* PANEL ĐIỀU KHIỂN */
        .panel {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.9);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            gap: 10px;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.1);
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        input {
            background: #333;
            color: white;
            padding: 10px 15px;
            border: 1px solid #444;
            border-radius: 8px;
            outline: none;
            font-family: 'Montserrat', sans-serif;
            -webkit-user-select: text; /* Vẫn cho phép gõ chữ vào ô input */
            user-select: text;
        }

        input:focus {
            border-color: #00c853;
        }

        .btn-action {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #00c853;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-action:hover {
            background: #00e676;
            transform: scale(1.05);
        }

        /* NÚT FULL ĐỘC LẬP */
        #fsBtn {
            background: #4D80F5;
            position: fixed !important;
            bottom: 25px;
            left: 24px;
            z-index: 25;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            min-width: 70px;
            text-align: center;
        }

        /* Khi đã full màn hình, biến thành nút X nhỏ gọn ở góc */
        .fs-active {
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: rgba(255, 255, 255, 0.6) !important;
            bottom: 15px !important;
            left: 15px !important;
            padding: 6px 12px !important;
            font-size: 14px !important;
            min-width: auto !important;
            border-radius: 6px !important;
        }

        /* MOBILE OPTIMIZATION */
        @media (max-width: 768px) {
            .overlay {
                padding: 0 20px;
                top: 20px;
            }
            .player {
                min-width: 120px;
                font-size: 16px;
                padding: 8px 15px;
            }
            .panel {
                flex-direction: column;
                width: 85%;
            }
        }
    </style>
</head>
<body>

    <div id="iframe-wrapper">
        <iframe id="stream-iframe" src="" allow="camera *; microphone *; autoplay *; fullscreen *" allowfullscreen></iframe>
    </div>

    <div class="overlay">
        <div class="player red" id="name1">Tiên</div>
        <div class="player blue" id="name2">Hậu</div>
    </div>

    <div class="panel" id="panel">
        <input id="input1" placeholder="Tên Đỏ (Tiên)">
        <input id="input2" placeholder="Tên Xanh (Hậu)">
        <button class="btn-action" onclick="updateNames()">Cập nhật ngay</button>
    </div>

    <button class="btn-action" id="fsBtn">FULL</button>

    <script>
        // 🔐 LỚP 1: LINK LUỒNG ĐÃ ĐƯỢC MÃ HÓA CỨNG TOÀN BỘ SANG BASE64
        // Chuỗi dưới đây khi giải mã ra chính xác là: https://vdo.ninja/?view=quocdang&cleanoutput&noaudio&buffer=0&buttons=0
        const secureToken = atob("aHR0cHM6Ly92ZG8ubmluamEvP3ZpZXc9cXVvY2RhbmcmY2xlYW5vdXRwdXQmbm9hdWRpbyZidWZmZXI9MCZidXR0b25zPTA=");
        
        const iframe = document.getElementById("stream-iframe");
        const panel = document.getElementById("panel");
        const btnFs = document.getElementById("fsBtn");

        // Khởi tạo dữ liệu từ URL
        const params = new URLSearchParams(window.location.search);
        const initialRed = params.get("d") || "Tiên";
        const initialBlue = params.get("x") || "Hậu";

        const elRed = document.getElementById("name1");
        const elBlue = document.getElementById("name2");

        elRed.innerText = initialRed;
        elBlue.innerText = initialBlue;

        // Bơm luồng bảo mật vào hệ thống
        iframe.src = secureToken;

        // Ẩn bảng nếu chạy qua link nhúng trực tiếp trên OBS
        if (params.get("live") === "1" || params.get("d") || params.get("x")) {
            panel.style.opacity = "0";
            panel.style.visibility = "hidden";
            btnFs.style.display = "none";
        }

        function updateNames() {
            const n1 = document.getElementById("input1").value.trim() || "Tiên";
            const n2 = document.getElementById("input2").value.trim() || "Hậu";

            elRed.innerText = n1;
            elBlue.innerText = n2;

            const newURL = `?d=${encodeURIComponent(n1)}&x=${encodeURIComponent(n2)}`;
            window.history.pushState({}, '', newURL);

            const btnUpdate = document.querySelector('.panel button');
            btnUpdate.innerText = "Đã lưu!";
            btnUpdate.style.background = "#2196F3";
            setTimeout(() => {
                btnUpdate.innerText = "Cập nhật ngay";
                btnUpdate.style.background = "#00c853";
            }, 2000);
        }

        // ĐIỀU KHIỂN FULLSCREEN ẨN Ô NHẬP LIỆU
        btnFs.addEventListener("click", async () => {
            try {
                if (!document.fullscreenElement) {
                    await document.documentElement.requestFullscreen();
                    btnFs.innerText = "✕"; 
                    btnFs.classList.add("fs-active");
                    panel.style.opacity = "0";
                    panel.style.visibility = "hidden";
                } else {
                    await document.exitFullscreen();
                    btnFs.innerText = "FULL";
                    btnFs.classList.remove("fs-active");
                    panel.style.opacity = "1";
                    panel.style.visibility = "visible";
                }
            } catch(e) {
                console.log("Lỗi fullscreen:", e);
            }
        });

        // Theo dõi nếu thoát full bằng phím cứng/vuốt màn hình
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                btnFs.innerText = "FULL";
                btnFs.classList.remove("fs-active");
                panel.style.opacity = "1";
                panel.style.visibility = "visible";
            }
        });

        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { updateNames(); }
        });

        // 🔐 LỚP 2: HỆ THỐNG PHÁO ĐÀI KHÓA CHẶT CHUỘT PHẢI, F12 VÀ PHÍM TẮT ĐỌC CODE
        
        // Chặn Menu chuột phải hoàn toàn
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        // Bắt và triệt hạ tất cả các tổ hợp phím tò mò
        document.onkeydown = function(e) {
            // 1. Chặn phím F12 thần thánh
            if (e.keyCode == 123) {
                return false;
            }
            // 2. Chặn Ctrl + Shift + I (Mở DevTools trên Chrome/Windows)
            if (e.ctrlKey && e.shiftKey && e.keyCode == 73) {
                return false;
            }
            // 3. Chặn Ctrl + Shift + J (Mở Console)
            if (e.ctrlKey && e.shiftKey && e.keyCode == 74) {
                return false;
            }
            // 4. Chặn Ctrl + Shift + C (Chế độ soi phần tử Element)
            if (e.ctrlKey && e.shiftKey && e.keyCode == 67) {
                return false;
            }
            // 5. Chặn Ctrl + U (Xem mã nguồn gốc View-Source)
            if (e.ctrlKey && e.keyCode == 85) {
                return false;
            }
            // 6. Chặn Cmd + Option + I (Hệ máy Macbook/Safari/Chrome)
            if (e.metaKey && e.altKey && e.keyCode == 73) {
                return false;
            }
            // 7. Chặn Cmd + U (Xem nguồn trên Mac)
            if (e.metaKey && e.keyCode == 85) {
                return false;
            }
        };
    </script>
</body>
</html>
