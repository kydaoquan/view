<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KĐQ Live Overlay</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: transparent; 
            font-family: 'Montserrat', sans-serif; 
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* KHUNG VIDEO */
        #iframe-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* OVERLAY TÊN PLAYER */
        .overlay {
            position: fixed;
            top: 80px;
            width: 100%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            padding: 0 150px;
            pointer-events: none;
        }

        .player {
            min-width: 180px;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 28px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .red { background: linear-gradient(135deg, rgba(255, 42, 42, 0.9), rgba(122, 0, 0, 0.9)); }
        .blue { background: linear-gradient(135deg, rgba(42, 123, 255, 0.9), rgba(0, 31, 122, 0.9)); }

        /* PANEL ĐIỀU KHIỂN (Ẩn khi không cần) */
        .panel {
            position: fixed;
            bottom: 25px; left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.9);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            gap: 10px;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.1);
        }

        input { background: #333; color: white; padding: 10px 15px; border: 1px solid #444; border-radius: 8px; outline: none; }
        .btn-action { padding: 10px 20px; border: none; border-radius: 8px; background: #00c853; color: white; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div id="iframe-wrapper">
        <iframe id="stream-iframe" src="" allow="camera *; microphone *; autoplay *; fullscreen *" allowfullscreen></iframe>
    </div>

    <div class="overlay">
        <div class="player red" id="name1">Tiên</div>
        <div class="player blue" id="name2">Hậu</div>
    </div>

    <div class="panel" id="panel">
        <input id="input1" placeholder="Tên Đỏ">
        <input id="input2" placeholder="Tên Xanh">
        <button class="btn-action" onclick="updateNames()">Cập nhật</button>
    </div>

    <script>
        const secretDomain = atob("aHR0cHM6Ly92ZG8ubmluamEv");
        const iframe = document.getElementById("stream-iframe");
        
        // Load luồng
        iframe.src = `${secretDomain}?view=quocdang&cleanoutput&noaudio&buffer=0`;

        // Khởi tạo từ URL
        const params = new URLSearchParams(window.location.search);
        document.getElementById("name1").innerText = params.get("d") || "Tiên";
        document.getElementById("name2").innerText = params.get("x") || "Hậu";

        // Logic cập nhật
        function updateNames() {
            const n1 = document.getElementById("input1").value.trim() || "Tiên";
            const n2 = document.getElementById("input2").value.trim() || "Hậu";
            document.getElementById("name1").innerText = n1;
            document.getElementById("name2").innerText = n2;
            window.history.pushState({}, '', `?d=${encodeURIComponent(n1)}&x=${encodeURIComponent(n2)}`);
        }

        // Tự ẩn bảng điều khiển nếu đã có tên trên URL (Dùng cho OBS)
        if (params.get("d") || params.get("x")) {
            document.getElementById("panel").style.display = "none";
        }
    </script>
</body>
</html>
